# ---------------------------------------------------------------------------
# WEST D0 base configuration — shared across all model experiments
# ---------------------------------------------------------------------------

# ── Node definitions ────────────────────────────────────────────────────────
nodes:
  # PCS:
  scan_nodes: ["IA_scope", "IBb_scope", "IDb_scope", "IEb_scope", "IFb_scope",
    "IFh_scope", "IEh_scope", "IDh_scope", "IBh_scope", "IXb_scope",
    "IXh_scope", "Ip_scope", "Vloop_scope", "R_scope", "Z_scope", "dXlow_scope",
    "EROG_scope", "PowLH1_scope", "PowLH2_scope", "PhaLH1_scope", "PhaLH2_scope",
    "PowIC1_scope", "PowIC2_scope", "PowIC3_scope", "PhaIC1_scope", "PhaIC2_scope",
    "PhaIC3_scope", "REF1_scope", "REF2_scope", "REF3_scope", ]

  LHW: ["PowLH1_scope", "PowLH2_scope", "PhaLH1_scope", "PhaLH2_scope",]
  # ICRH: ["PowIC1_scope", "PowIC2_scope", "PowIC3_scope",
  #     "PhaIC1_scope", "PhaIC2_scope", "PhaIC3_scope"]
  # There are so many nan in PhaIC[1-3]_scope, so we change to only Power.
  ICRH: ["PowIC1_scope", "PowIC2_scope", "PowIC3_scope"]
  PF: ["IBb_scope", "IDb_scope", "IEb_scope", "IFb_scope",
    "IFh_scope", "IEh_scope", "IDh_scope", "IBh_scope", "IXb_scope",
    "IXh_scope",]
  CS: ["IA_scope"]
  Vloop: ["Vloop_scope"]
  Ne: ["REF1_scope"]
  Ip: ["Ip_scope"]

  D0_signals: ["beta_normal", "beta_pol", "beta_tor", "energy_mhd", "q_95", "q_axis"]
  rendered_D0_signals: ["$\\beta_{n}$", "$\\beta_{p}$", "$\\beta_{t}$",
    "$W_{mhd}$", "$q_{95}$", "$q_0$"]


# ── Paths ───────────────────────────────────────────────────────────────────
base_dir: "$HOME/Papers/WestD0Clean"

# ── Data ────────────────────────────────────────────────────────────────────
data:
  database_dir: $DATABASE_PATH/DataBase/other_devices/WEST
  # scope_0 = reference; scope_3 = real data
  input_list: ["LHW_real", "ICRH_real", "Ip_ref", "Ne_real", "PF_real"]
  output_list: ["D0_signals"]
  shuffle: True
  filter_wz: 1001  # 99 -> 1001
  batch_size: 4
  num_workers: 4
  sample_num: None
  ratios: [0.6, 0.2, 0.2]
